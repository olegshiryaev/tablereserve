upstream tablereserve_django {
    server django:8000;
}

server {
    listen 80;
    server_name 185.233.200.182 vm4321460.firstbyte.club;

    client_max_body_size 20M;

    location /static/ {
        alias /app/static/;
    }

    location /media/ {
        alias /app/media/;
    }

    location / {
        proxy_pass http://tablereserve_django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
